<style>
	* { margin: 0; padding: 0; box-sizing: border-box; }
	body {
		font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
		background: #0d1117;
		color: #e6edf3;
		overflow: hidden;
		height: 100vh;
	}
	.header {
		text-align: center;
		padding: 40px 20px 20px;
		position: sticky;
		left: 0;
	}
	.header h1 {
		font-size: 28px;
		font-weight: 700;
		background: linear-gradient(135deg, #58a6ff, #bc8cff);
		-webkit-background-clip: text;
		-webkit-text-fill-color: transparent;
		margin-bottom: 8px;
	}
	.header .subtitle {
		color: #8b949e;
		font-size: 16px;
	}
	.header .stat {
		margin-top: 16px;
	}

	.header .stat-label {

		text-transform: uppercase;
		letter-spacing: 1px;
	}
	.timeline-container {
		padding: 20px 20px 40px;
		width: 100%;
	}
	.timeline-track {
		position: relative;
		min-width: 100%;
	}
	.axis-line {
		position: absolute;
		left: 0;
		right: 0;
		height: 2px;
		background: #30363d;
	}
	.day-divider {
		position: absolute;
		width: 1px;
		background: #58a6ff22;
		z-index: 0;
	}
	.day-divider-label {
		position: absolute;
		font-size: 13px;
		font-weight: 600;
		color: #58a6ff;
		transform: translateX(-50%);
		white-space: nowrap;
	}
	.hour-marker {
		position: absolute;
		width: 1px;
		height: 14px;
		background: #30363d;
	}
	.hour-label {
		position: absolute;
		font-size: 10px;
		color: #484f58;
		transform: translateX(-50%);
		white-space: nowrap;
	}
	.pr-dot {
		position: absolute;
		width: 10px;
		height: 10px;
		border-radius: 50%;
		background: #a371f7;
		transform: translateX(-5px);
		z-index: 2;
		cursor: pointer;
		transition: transform 0.15s ease, box-shadow 0.15s ease;
	}
	.pr-dot:hover {
		transform: translateX(-5px) scale(1.8);
		box-shadow: 0 0 12px #a371f7;
	}
	.pr-stem {
		position: absolute;
		width: 1px;
		z-index: 1;
	}
	.pr-stem.up { background: linear-gradient(to top, #30363d, transparent); }
	.pr-stem.down { background: linear-gradient(to bottom, #30363d, transparent); }
	.pr-label {
		position: absolute;
		font-size: 11px;
		white-space: nowrap;
		z-index: 3;
		transform: translateX(-50%);
		text-align: center;
	}
	.pr-number {
		font-weight: 700;
		font-size: 12px;
		color: #a371f7;
	}
	.pr-title {
		color: #8b949e;
		font-size: 10px;
		display: block;
		max-width: 110px;
		overflow: hidden;
		text-overflow: ellipsis;
		margin: 0 auto;
	}
	a { color: inherit; text-decoration: none; }
	a:hover .pr-title { color: #e6edf3; }
</style>

	{ n: 161, t: "feat: WebMCP bridge", ts: "2026-03-21T15:41:06Z" },

	{ n: 167, t: "fix: internal ai infrastructure", ts: "2026-03-21T16:51:32Z" },

	{ n: 169, t: "Fix: exclude tool results from history", ts: "2026-03-22T08:34:45Z" },
	{ n: 170, t: "fix: thumbs down icon red", ts: "2026-03-22T08:46:44Z" },
	{ n: 171, t: "Remove conversational routing", ts: "2026-03-22T09:04:58Z" },
	{ n: 172, t: "fix: contextual field filtering", ts: "2026-03-22T09:05:59Z" },
	{ n: 173, t: "Fix for issue #147", ts: "2026-03-22T09:11:34Z" },
	{ n: 174, t: "feat: settings gear icon tab", ts: "2026-03-22T09:41:09Z" },
	{ n: 175, t: "feat: eval() malware pattern", ts: "2026-03-22T09:45:22Z" },
	{ n: 177, t: "feat: remove get-site-url ability", ts: "2026-03-22T09:55:12Z" },
	{ n: 178, t: "Voice input (Whisper) push-to-talk", ts: "2026-03-22T10:01:14Z" },
	{ n: 180, t: "fix: remove query redaction", ts: "2026-03-22T10:18:00Z" },
	{ n: 182, t: "feat: local RAG knowledge base", ts: "2026-03-22T10:55:55Z" },
];

const repo = "https://github.com/pluginslab/wp-agentic-admin/pull/";
const container = document.getElementById("timeline");

// Group PRs by day and build collapsed time segments
const dayLabels = {
	"2026-03-20": "Day 1 — Thu Mar 20",
	"2026-03-21": "Day 2 — Fri Mar 21",
	"2026-03-22": "Day 3 — Sat Mar 22",
};

const dayKeys = [...new Set(prs.map(pr => pr.ts.slice(0, 10)))].sort();
const daySegments = dayKeys.map(day => {
	const dayPrs = prs.filter(p => p.ts.startsWith(day));
	const times = dayPrs.map(p => new Date(p.ts));
	return {
		day,
		label: dayLabels[day] || day,
		min: new Date(Math.min(...times) - 20 * 60000),
		max: new Date(Math.max(...times) + 20 * 60000),
		duration: (Math.max(...times) - Math.min(...times) + 40 * 60000) / 60000,
	};
});

const DAY_GAP = 40; // px gap between days
const AXIS_Y = 200;
const PADDING = 30;

// Fit to viewport: calculate PX_PER_MIN from available width
const viewportWidth = window.innerWidth;
const totalMinutes = daySegments.reduce((sum, s) => sum + s.duration, 0);
const availableWidth = viewportWidth - 2 * PADDING - (daySegments.length - 1) * DAY_GAP;
const PX_PER_MIN = availableWidth / totalMinutes;

// Compute cumulative offsets for each day segment
let cumulativeX = PADDING;
daySegments.forEach(seg => {
	seg.startX = cumulativeX;
	seg.widthPx = seg.duration * PX_PER_MIN;
	cumulativeX += seg.widthPx + DAY_GAP;
});

const trackWidth = viewportWidth - 2 * PADDING;
const trackHeight = 460;

function xFor(date) {
	const d = new Date(date);
	const day = d.toISOString().slice(0, 10);
	const seg = daySegments.find(s => s.day === day);
	if (!seg) return 0;
	const minutesIntoDay = (d - seg.min) / 60000;
	return seg.startX + minutesIntoDay * PX_PER_MIN;
}

const track = document.createElement("div");
track.className = "timeline-track";
track.style.width = trackWidth + "px";
track.style.height = trackHeight + "px";

// Axis line
const axis = document.createElement("div");
axis.className = "axis-line";
axis.style.top = AXIS_Y + "px";
axis.style.width = trackWidth + "px";
track.appendChild(axis);

// Per-day: hour markers, day labels, dividers
daySegments.forEach((seg, si) => {
	// Day label centered over segment
	const midX = seg.startX + seg.widthPx / 2;
	const lbl = document.createElement("div");
	lbl.className = "day-divider-label";
	lbl.style.left = midX + "px";
	lbl.style.top = (AXIS_Y + 42) + "px";
	lbl.textContent = seg.label;
	track.appendChild(lbl);

	// Day divider line before this segment (except first)
	if (si > 0) {
		const divX = seg.startX - DAY_GAP / 2;
		const div = document.createElement("div");
		div.className = "day-divider";
		div.style.left = divX + "px";
		div.style.top = "20px";
		div.style.height = (trackHeight - 40) + "px";
		track.appendChild(div);
	}

	// Hour markers within this day's range
	const firstHour = new Date(seg.min);
	firstHour.setUTCMinutes(0, 0, 0);
	if (firstHour < seg.min) firstHour.setUTCHours(firstHour.getUTCHours() + 1);

	for (let h = new Date(firstHour); h <= seg.max; h = new Date(h.getTime() + 3600000)) {
		const x = seg.startX + ((h - seg.min) / 60000) * PX_PER_MIN;
		const marker = document.createElement("div");
		marker.className = "hour-marker";
		marker.style.left = x + "px";
		marker.style.top = (AXIS_Y - 7) + "px";
		track.appendChild(marker);

		const hl = document.createElement("div");
		hl.className = "hour-label";
		hl.style.left = x + "px";
		hl.style.top = (AXIS_Y + 12) + "px";
		hl.textContent = h.getUTCHours().toString().padStart(2, "0") + ":00";
		track.appendChild(hl);
	}
});

// Place PRs — alternate up/down, vary stem length in 3-tier cycle
prs.forEach((pr, i) => {
	const x = xFor(pr.ts);
	const goUp = i % 2 === 0;

	// Dot
	const dot = document.createElement("div");
	dot.className = "pr-dot";
	dot.style.left = x + "px";
	dot.style.top = (AXIS_Y - 5) + "px";
	dot.title = `#${pr.n}: ${pr.t}`;
	track.appendChild(dot);

	// Stem
	const stem = document.createElement("div");
	stem.className = `pr-stem ${goUp ? "up" : "down"}`;
	stem.style.left = x + "px";

	const stemLen = 50 + (i % 3) * 25;

	if (goUp) {
		stem.style.top = (AXIS_Y - stemLen) + "px";
		stem.style.height = stemLen + "px";
	} else {
		stem.style.top = (AXIS_Y + 7) + "px";
		stem.style.height = stemLen + "px";
	}
	track.appendChild(stem);

	// Label
	const lbl = document.createElement("a");
	lbl.href = repo + pr.n;
	lbl.target = "_blank";
	lbl.className = "pr-label";

	if (goUp) {
		lbl.style.bottom = (trackHeight - AXIS_Y + stemLen + 4) + "px";
	} else {
		lbl.style.top = (AXIS_Y + 7 + stemLen + 4) + "px";
	}
	lbl.style.left = x + "px";

	lbl.innerHTML = `<span class="pr-number">#${pr.n}</span>`;
	track.appendChild(lbl);
});

container.appendChild(track);

</script>

</body>
</html>
