<!DOCTYPE html>
<html>
<head>
	<title>WP Agentic Admin — Ability Test Harness</title>
</head>
<body>
	<h1>Ability Test Harness</h1>
	<pre id="log"></pre>

	<!-- Load the test harness bundle (includes WebLLM + ReactAgent + ToolRegistry) -->
	<script src="../../build-test-harness/test-harness.js"></script>
	<script>
		/**
		 * Test harness runtime.
		 * Puppeteer calls window.runTests() after injecting abilities and test cases.
		 */

		const log = ( msg ) => {
			document.getElementById( 'log' ).textContent += msg + '\n';
			console.log( '[TestHarness]', msg );
		};

		/**
		 * Model loader shim — wraps WebLLM engine with the interface ReactAgent expects.
		 *
		 * ReactAgent calls modelLoader.getEngine() to get an OpenAI-compatible engine.
		 * WebLLM's CreateMLCEngine returns exactly that.
		 */
		class TestModelLoader {
			constructor() {
				this.engine = null;
			}
			getEngine() {
				return this.engine;
			}
			isModelReady() {
				return this.engine !== null;
			}
			updateUsageStats() {}
			async load( modelId ) {
				log( `Loading model: ${ modelId }...` );

				const { webllm } = window.TestHarness;
				let lastPct = -1;

				this.engine = await webllm.CreateMLCEngine( modelId, {
					initProgressCallback: ( report ) => {
						const pct = Math.round( report.progress * 100 );
						if ( pct !== lastPct && pct % 10 === 0 ) {
							lastPct = pct;
							log( `  ${ pct }% - ${ report.text || '' }` );
						}
					},
				} );

				log( 'Model loaded and ready.' );
			}
		}

		/**
		 * Run all test cases.
		 *
		 * Called by Puppeteer after injecting config via window.__testConfig.
		 *
		 * @return {Promise<Object>} Results object
		 */
		window.runTests = async function() {
			const config = window.__testConfig;
			if ( ! config ) {
				return { error: 'No test config found. Set window.__testConfig first.' };
			}

			const { modelId, abilities, tests } = config;
			const { ReactAgent, toolRegistry } = window.TestHarness;

			// Register all abilities
			for ( const ability of abilities ) {
				// Provide a stub execute if not defined
				if ( ! ability.execute ) {
					ability.execute = async () => ( { success: true, stub: true } );
				}
				toolRegistry.register( ability );
			}

			log( `Registered ${ abilities.length } abilities.` );

			// Load model
			const modelLoader = new TestModelLoader();
			await modelLoader.load( modelId );

			// Create ReAct agent
			const agentOptions = config.disableThinking ? { disableThinking: true } : {};
			const agent = new ReactAgent( modelLoader, toolRegistry, agentOptions );

			// Run tests
			const results = [];

			for ( let i = 0; i < tests.length; i++ ) {
				const test = tests[ i ];
				log( `\nTest ${ i + 1 }/${ tests.length }: "${ test.input }"` );

				try {
					const result = await agent.execute( test.input, [] );

					const toolCalled = result.toolsUsed.length > 0
						? result.toolsUsed[ 0 ]
						: null;

					let passed;
					if ( test.expectTool === null ) {
						// Expect no tool call
						passed = toolCalled === null;
					} else if ( Array.isArray( test.expectTool ) ) {
						// Accept any of the listed tools
						passed = test.expectTool.includes( toolCalled );
					} else {
						passed = toolCalled === test.expectTool;
					}

					const testResult = {
						input: test.input,
						expectTool: test.expectTool,
						actualTool: toolCalled,
						allToolsUsed: result.toolsUsed,
						finalAnswer: result.finalAnswer,
						iterations: result.iterations,
						passed,
					};

					results.push( testResult );
					log( `  ${ passed ? 'PASS' : 'FAIL' } — tool: ${ toolCalled || '(none)' }${ ! passed ? ` (expected: ${ test.expectTool || '(none)' })` : '' }` );
				} catch ( err ) {
					results.push( {
						input: test.input,
						expectTool: test.expectTool,
						actualTool: null,
						error: err.message,
						passed: false,
					} );
					log( `  ERROR — ${ err.message }` );
				}
			}

			// Detect which mode the agent used
			const mode = agent.useFunctionCalling ? 'function-calling' : 'prompt-based';
			log( `\nMode: ${ mode }` );

			// Clean up
			toolRegistry.clear();

			const passCount = results.filter( r => r.passed ).length;
			log( `\nDone: ${ passCount }/${ results.length } passed.` );

			return { results, passed: passCount, total: results.length, mode };
		};
	</script>
</body>
</html>
